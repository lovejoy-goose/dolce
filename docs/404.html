<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Страница не найдена — Сметчик · Петрозаводск</title>
<meta name="robots" content="noindex" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#fbfbfd;color:#111113;display:flex;align-items:center;justify-content:center;text-align:center;padding:32px;line-height:1.5}
  .n{font-size:clamp(72px,18vw,140px);font-weight:600;letter-spacing:-.05em;line-height:1}
  h1{font-size:clamp(22px,4vw,30px);font-weight:600;letter-spacing:-.02em;margin:18px 0 14px}
  p{font-size:17px;color:#6e6e73;max-width:420px;margin:0 auto 32px}
  a{display:inline-block;background:#111113;color:#fff;text-decoration:none;padding:14px 30px;border-radius:980px;font-size:16px;font-weight:500;transition:opacity .2s}
  a:hover{opacity:.85}
</style>
</head>
<body>
  <div>
    <div class="n">404</div>
    <h1>Страница не найдена</h1>
    <p>Возможно, ссылка устарела или страница была перемещена.</p>
    <a href="/">На главную</a>
  </div>
</body>
</html>
